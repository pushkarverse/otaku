<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBZ: Kamehameha Training</title>

    <link rel="stylesheet" href="src/css/dbz.css">

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>
    <video id="v_src" autoplay playsinline></video>
    <canvas id="out"></canvas>
    <div class="scanlines"></div>

    <!-- Assets -->
    <video id="v-energy" src="assets/energy.mp4" crossorigin="anonymous" muted loop playsinline style="display:none"></video>
    <video id="v-kame" src="assets/kamehameha.mp4" crossorigin="anonymous" muted loop playsinline style="display:none"></video>
    <audio id="sfx-kame" src="assets/kamehameha.mp3" crossorigin="anonymous" preload="auto"></audio>

    <div class="overlay">
        <div class="title-container">
            <h1 class="title">Dragon Ball Z</h1>
        </div>
        <div id="state-firing" class="state-label">KAMEHAMEHA!</div>

        <div class="hint">
            CHARGE: HANDS TOGETHER (CLOSED)<br>
            FIRE: HANDS APART (OPEN) + ARMS FORWARD
        </div>
    </div>

    <script type="module" src="src/js/modules/dbz.js"></script>
</body>
</html>
