<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBZ: Kamehameha Training</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Bangers&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        #v_src {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 0;
        }

        #out {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 3;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }

        .title-container {
            text-align: center;
        }

        .title {
            font-family: 'Bangers', cursive;
            font-size: 5rem;
            letter-spacing: 5px;
            color: #ff9900;
            text-shadow: 4px 4px 0 #0055ff, 0 0 20px rgba(255, 153, 0, 0.8);
            margin: 0;
        }

        .subtitle {
            font-size: 1.2rem;
            letter-spacing: 8px;
            color: #00ccff;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 204, 255, 0.5);
        }

        .state-label {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Bangers', cursive;
            font-size: 4rem;
            letter-spacing: 3px;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: blur(10px);
        }

        .state-label.active {
            opacity: 1;
            filter: blur(0px);
            transform: translateX(-50%) scale(1.1);
        }

        #state-charging {
            color: #00ccff;
            text-shadow: 0 0 20px #0055ff, 0 0 40px #0033ff;
        }

        #state-firing {
            color: #ffcc00;
            text-shadow: 0 0 20px #ff6600, 0 0 40px #ff3300;
        }

        .hint {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-align: right;
        }

        /* Scanline effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>

<body>

    <video id="v_src" autoplay playsinline></video>
    <canvas id="out"></canvas>
    <div class="scanlines"></div>

    <!-- Hidden Assets for FX -->
    <video id="v-energy" src="dbz/assets/energy.mp4" crossorigin="anonymous" muted loop playsinline style="display:none"></video>
    <video id="v-kame" src="dbz/assets/kamehameha.mp4" crossorigin="anonymous" muted loop playsinline style="display:none"></video>
    <audio id="sfx-kame" src="assets/kamehameha.mp3" crossorigin="anonymous" preload="auto"></audio>

    <div class="overlay">
        <div class="title-container">
            <h1 class="title">Dragon Ball Z</h1>
        </div>
        <div id="state-firing" class="state-label" style="display:none"></div>

        <div class="hint">
            CHARGE: HANDS TOGETHER (CLOSED)<br>
            FIRE: HANDS APART (OPEN) + ARMS FORWARD
        </div>
    </div>

    <script>
        const video = document.getElementById('v_src');
        const canvas = document.getElementById('out');
        const ctx = canvas.getContext('2d');
        const vEnergy = document.getElementById('v-energy');
        const vKame = document.getElementById('v-kame');
        const sfxKame = document.getElementById('sfx-kame');
        const labelFiring = document.getElementById('state-firing');

        let currentState = "IDLE";
        let idleFrames = 0;
        let smoothH = { x: -1, y: -1 };
        let fireAngle = 0;
        const smoothFactor = 0.8;

        // Sequencing (Now purely visual/audio build-up)
        let chargeProgress = 0;
        const fireReadyThreshold = 0.85; // Slightly earlier fire ready

        function drawShiningEnergy(ctx, x, y, size, progress) {
            const time = performance.now() * 0.005;
            ctx.save();
            ctx.translate(x, y);
            
            // 1. Background Aura Glow (Expanding)
            const auraGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 1.5);
            auraGrad.addColorStop(0, `rgba(0, 200, 255, ${0.1 * progress})`);
            auraGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = auraGrad;
            ctx.beginPath();
            ctx.arc(0, 0, size * 1.5, 0, Math.PI * 2);
            ctx.fill();

            // 2. Wrap-Around Inward Streaks (Wisps)
            ctx.lineWidth = 2;
            for (let i = 0; i < 12; i++) { // More wisps
                const angle = (i / 12) * Math.PI * 2 + time * 0.8;
                const p = (time * 1.8 + i) % 1;
                const dist = size * (3.0 - p * 2.5); // Wider start area
                
                ctx.strokeStyle = `rgba(180, 245, 255, ${0.7 * (1 - p)})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#00eeff";
                ctx.beginPath();
                ctx.moveTo(Math.cos(angle) * dist, Math.sin(angle) * dist);
                
                // Spiral wrap logic
                const cpAngle = angle + 0.8 * (1-p);
                const cpDist = dist * 0.7;
                ctx.quadraticCurveTo(
                    Math.cos(cpAngle) * cpDist, 
                    Math.sin(cpAngle) * cpDist,
                    0, 0
                );
                ctx.stroke();
            }
            ctx.shadowBlur = 0;

            // 2.5. Inward Light Rays (Straight pulling lines)
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2 - time * 0.3;
                const p = (time * 2.5 + i) % 1;
                const rLen = size * 0.5;
                const rStart = size * (2.0 - p * 1.5);
                ctx.strokeStyle = `rgba(255, 255, 255, ${0.3 * (1-p)})`;
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(Math.cos(angle) * rStart, Math.sin(angle) * rStart);
                ctx.lineTo(Math.cos(angle) * (rStart + rLen), Math.sin(angle) * (rStart + rLen));
                ctx.stroke();
            }

            // 3. Shrinking Concentric Rings
            for (let i = 0; i < 3; i++) {
                const ringP = (time * 2 + i / 3) % 1;
                const rSize = size * (1.5 - ringP * 1.2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${0.4 * (1 - ringP)})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, rSize * 0.5, 0, Math.PI * 2);
                ctx.stroke();
            }

            // 4. Core Ki Core
            const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.7);
            coreGrad.addColorStop(0, `rgba(255, 255, 255, ${0.7 + 0.3 * progress})`);
            coreGrad.addColorStop(0.3, `rgba(0, 238, 255, ${0.5 + 0.5 * progress})`);
            coreGrad.addColorStop(1, 'rgba(0, 238, 255, 0)');
            ctx.fillStyle = coreGrad;
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.7, 0, Math.PI * 2);
            ctx.fill();

            // 5. Energy Media Overlay (Rotational)
            if (!vEnergy.paused) {
                const vSize = size * (0.3 + 0.7 * progress);
                ctx.rotate(-time * 1.2); // Faster rotation
                ctx.globalAlpha = 0.5 + 0.5 * progress;
                ctx.drawImage(vEnergy, -vSize/2, -vSize/2, vSize, vSize);
            }
            ctx.restore();
        }

        function getAngle3D(a, b, c) {
            const v1 = { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
            const v2 = { x: c.x - b.x, y: c.y - b.y, z: c.z - b.z };
            const dot = v1.x * v2.x + v1.y * v2.y + v1.z * v2.z;
            const mag1 = Math.sqrt(v1.x**2 + v1.y**2 + v1.z**2);
            const mag2 = Math.sqrt(v2.x**2 + v2.y**2 + v2.z**2);
            if (mag1 === 0 || mag2 === 0) return 0;
            let cos = dot / (mag1 * mag2);
            cos = Math.max(-1, Math.min(1, cos));
            return Math.acos(cos) * (180 / Math.PI);
        }

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 0, 
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
            if (canvas.width !== video.videoWidth) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(-1, 1);
            ctx.translate(-canvas.width, 0);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

            let targetState = "IDLE";
            let hx = -1, hy = -1;
            let currentAngle = 0;

            if (results.poseLandmarks) {
                const lm = results.poseLandmarks;
                const leftShoulder = lm[11], rightShoulder = lm[12];
                const leftElbow = lm[13], rightElbow = lm[14];
                const lWrist = lm[15], rWrist = lm[16];
                const lThumb = lm[19], rThumb = lm[20];
                const lPinky = lm[17], rPinky = lm[18];

                if (lWrist.visibility > 0.4 && rWrist.visibility > 0.4) {
                    const shDist = Math.hypot(leftShoulder.x - rightShoulder.x, leftShoulder.y - rightShoulder.y);
                    const wristDist = Math.hypot(lWrist.x - rWrist.x, lWrist.y - rWrist.y);
                    
                    const lC = { x: (lWrist.x + lThumb.x + lPinky.x)/3, y: (lWrist.y + lThumb.y + lPinky.y)/3 };
                    const rC = { x: (rWrist.x + rThumb.x + rPinky.x)/3, y: (rWrist.y + rThumb.y + rPinky.y)/3 };
                    hx = (lC.x + rC.x) / 2 * canvas.width;
                    hy = (lC.y + rC.y) / 2 * canvas.height;

                    const bcx = (leftShoulder.x + rightShoulder.x) / 2;
                    const bcy = (leftShoulder.y + rightShoulder.y) / 2;
                    const dx = hx - bcx * canvas.width;
                    const dy = hy - bcy * canvas.height;
                    currentAngle = Math.atan2(dy, dx);

                    // GESTURE DETECTION: STRICT HANDS TOGETHER
                    const isCupped = wristDist < shDist * 0.55; // Cup Hands Together
                    const isOpening = wristDist > shDist * 0.85; // Opening for blast

                    const leftElbowAngle = getAngle3D(leftShoulder, leftElbow, lWrist);
                    const rightElbowAngle = getAngle3D(rightShoulder, rightElbow, rWrist);
                    const armsExtended = Math.max(leftElbowAngle, rightElbowAngle) > 115;

                    if (isCupped) {
                        targetState = "CHARGING";
                    } else if (isOpening || armsExtended) {
                        if (currentState === "CHARGING") {
                            const audioProgress = sfxKame.currentTime / (sfxKame.duration || 1);
                            // Fire if arms thrust forward OR if hands open near the 'HA' mark
                            if (armsExtended || audioProgress > fireReadyThreshold) {
                                targetState = "FIRING";
                            } else {
                                targetState = "IDLE";
                            }
                        } else if (currentState === "FIRING") {
                            targetState = "FIRING"; // Continue blast
                        } else {
                            targetState = "IDLE";
                        }
                    } else {
                        targetState = "IDLE"; // Immediate stop if any other pose
                    }
                }
            }

            if (targetState === "IDLE") {
                if (currentState !== "IDLE") {
                    currentState = "IDLE";
                    chargeProgress = 0;
                    sfxKame.pause();
                    sfxKame.currentTime = 0;
                    vEnergy.pause();
                    vKame.pause();
                    labelFiring.classList.remove('active');
                }
            } else {
                if (targetState === "CHARGING") {
                    if (currentState !== "CHARGING") {
                        sfxKame.currentTime = 0;
                        sfxKame.play().catch(()=>{});
                        vEnergy.play().catch(()=>{});
                    }
                    if (sfxKame.duration > 0) {
                        chargeProgress = sfxKame.currentTime / sfxKame.duration;
                    }
                } else if (targetState === "FIRING") {
                    if (currentState !== "FIRING") {
                        vKame.currentTime = 0; 
                        vKame.play().then(() => {
                        }).catch(e => console.error("Video play error:", e));
                        labelFiring.classList.add('active');
                    }
                }
                currentState = targetState;
            }

            if (hx !== -1) {
                if (smoothH.x === -1) {
                    smoothH.x = hx; smoothH.y = hy;
                    fireAngle = currentAngle;
                } else {
                    smoothH.x = (1 - smoothFactor) * smoothH.x + smoothFactor * hx;
                    smoothH.y = (1 - smoothFactor) * smoothH.y + smoothFactor * hy;
                    let adiff = currentAngle - fireAngle;
                    while (adiff > Math.PI) adiff -= Math.PI * 2;
                    while (adiff < -Math.PI) adiff += Math.PI * 2;
                    fireAngle += adiff * smoothFactor;
                }
            }

            ctx.globalCompositeOperation = 'screen';
            if (currentState === "CHARGING" && smoothH.x !== -1) {
                const size = canvas.height * (0.15 + (chargeProgress * 0.45));
                drawShiningEnergy(ctx, smoothH.x, smoothH.y, size, chargeProgress);
            } else if (currentState === "FIRING" && smoothH.x !== -1) {
                const h = canvas.height * 1.2;
                const aspect = (vKame.videoWidth || 1) / (vKame.videoHeight || 1);
                const w = h * aspect;
                ctx.save();
                ctx.translate(smoothH.x, smoothH.y);
                ctx.rotate(fireAngle);
                const coreSize = canvas.height * 0.5;
                ctx.save();
                ctx.rotate(performance.now() * 0.01);
                ctx.drawImage(vEnergy, -coreSize/2, -coreSize/2, coreSize, coreSize);
                ctx.restore();
                ctx.drawImage(vKame, -w * 0.05, -h/2, w, h);
                ctx.restore();
            }
            ctx.restore();
        });

        const cam = new Camera(video, {
            onFrame: async () => {
                await pose.send({ image: video });
            },
            width: 640,
            height: 480
        });
        cam.start();
    </script>
</body>
</html>
