<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jutsu Selector</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Orbitron:wght@700;900&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #050505;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: 'Cinzel', serif;
    }

    .title {
      position: absolute;
      top: 50px;
      font-size: 3rem;
      letter-spacing: 15px;
      text-transform: uppercase;
      text-align: center;
      z-index: 10;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
      animation: fadeInDown 1.5s ease-out;
      pointer-events: none;
    }

    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .side {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* Naruto Side - Orange Theme */
    #naruto-side {
      background: linear-gradient(135deg, #110000 0%, #3d1400 100%);
      border-right: 2px solid rgba(255, 166, 0, 0.2);
    }

    #naruto-side:hover {
      flex: 1.3;
      background: linear-gradient(135deg, #220000 0%, #682200 100%);
      box-shadow: inset -20px 0 50px rgba(255, 140, 0, 0.3);
    }

    /* Gojo Side - Purple/Blue Theme */
    #gojo-side {
      background: linear-gradient(135deg, #000411 0%, #16003b 100%);
      border-left: 2px solid rgba(138, 43, 226, 0.2);
      font-family: 'Orbitron', sans-serif;
    }

    #gojo-side:hover {
      flex: 1.3;
      background: linear-gradient(135deg, #000822 0%, #290070 100%);
      box-shadow: inset 20px 0 50px rgba(138, 43, 226, 0.3);
    }

    #draw-side:hover {
      flex: 1.3;
      background: linear-gradient(135deg, #002208 0%, #007029 100%);
      box-shadow: inset 0 0 50px rgba(0, 255, 68, 0.3);
    }

    /* DBZ Side - Orange/Cyan Theme */
    #dbz-side {
      background: linear-gradient(135deg, #1a0f00 0%, #3d2400 100%);
      border-left: 2px solid rgba(255, 153, 0, 0.2);
      font-family: 'Orbitron', sans-serif;
    }

    #dbz-side:hover {
      flex: 1.3;
      background: linear-gradient(135deg, #2a1a00 0%, #663d00 100%);
      box-shadow: inset 20px 0 50px rgba(255, 153, 0, 0.3);
    }

    /* Content Styling */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      transition: transform 0.4s ease;
    }

    .side:hover .content {
      transform: scale(1.1);
    }

    h2 {
      font-size: 4rem;
      margin-bottom: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    #naruto-side h2 {
      color: #ffaa00;
      text-shadow: 0 0 20px #ff6600, 0 0 40px #ff3300;
    }

    #gojo-side h2 {
      color: #00eeff;
      text-shadow: 0 0 20px #0088ff, 0 0 40px #bb44ff;
    }

    #draw-side h2 {
      color: #00ff44;
      text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff00;
    }

    #dbz-side h2 {
      color: #ff9900;
      text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff6600;
    }

    .kanji {
      font-size: 8rem;
      opacity: 0.1;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    #naruto-side .kanji {
      color: #ffaa00;
    }

    #gojo-side .kanji {
      color: #bb44ff;
    }

    #draw-side .kanji {
      color: #00ff44;
    }

    #dbz-side .kanji {
      color: #ff9900;
      font-family: 'Cinzel', serif;
    }

    .side:hover .kanji {
      opacity: 0.3;
      transform: translate(-50%, -50%) scale(1.2);
    }

    p {
      font-size: 1.2rem;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 20px;
    }

    /* Particles/Decorations */
    .decoration {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #naruto-side:hover .decoration {
      opacity: 1;
      background: radial-gradient(circle at center, transparent 30%, rgba(255, 100, 0, 0.1) 100%);
    }

    #gojo-side:hover .decoration {
      opacity: 1;
      background: radial-gradient(circle at center, transparent 30%, rgba(138, 43, 226, 0.1) 100%);
    }

    #draw-side:hover .decoration {
      opacity: 1;
      background: radial-gradient(circle at center, transparent 30%, rgba(0, 255, 68, 0.1) 100%);
    }

    #dbz-side:hover .decoration {
      opacity: 1;
      background: radial-gradient(circle at center, transparent 30%, rgba(255, 153, 0, 0.1) 100%);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Click Ripple Effect */
    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: clickRipple 0.6s linear;
      pointer-events: none;
      z-index: 100;
    }

    #naruto-side .ripple {
      background-color: rgba(255, 166, 0, 0.4);
    }

    #gojo-side .ripple {
      background-color: rgba(0, 238, 255, 0.4);
    }

    #draw-side .ripple {
      background-color: rgba(0, 255, 68, 0.4);
    }

    #dbz-side .ripple {
      background-color: rgba(255, 153, 0, 0.4);
    }

    @keyframes clickRipple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* Fade Out for Page Transition */
    .fade-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: black;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    .fade-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
  </style>
</head>

<body>

  <div class="fade-overlay" id="fade-overlay"></div>

  <h1 class="title">Select Technique</h1>

  <div class="container">
    <!-- Naruto Section -->
    <div class="side" id="naruto-side" onclick="launchApp('naruto.html', event)">
      <div class="decoration"></div>
      <div class="kanji">火影</div>
      <div class="content">
        <h2>Naruto</h2>
        <p>Ninjutsu • Shadow Clone</p>
        <p style="font-size: 0.9rem; margin-top: 5px; color: #ff6600;">(Rasengan, Chidori)</p>
      </div>
    </div>

    <!-- Gojo Section -->
    <div class="side" id="gojo-side" onclick="launchApp('gojo.html', event)">
      <div class="decoration"></div>
      <div class="kanji">呪術</div>
      <div class="content">
        <h2>Gojo Sat0ru</h2>
        <p>Limitless • Infinity</p>
        <p style="font-size: 0.9rem; margin-top: 5px; color: #00eeff;">(Red, Blue, Purple, Void)</p>
      </div>
    </div>

    <!-- Draw Section -->
    <div class="side" id="draw-side" onclick="launchApp('draw.html', event)">
      <div class="decoration"></div>
      <div class="kanji">筆</div>
      <div class="content">
        <h2>Free Draw</h2>
        <p>Canvas • Colors</p>
        <p style="font-size: 0.9rem; margin-top: 5px; color: #00ff44;">(Brush, Eraser, Tools)</p>
      </div>
    </div>

    <!-- DBZ Section -->
    <div class="side" id="dbz-side" onclick="launchApp('dbz.html', event)">
      <div class="decoration"></div>
      <div class="kanji">悟</div>
      <div class="content">
        <h2>Dragon Ball Z</h2>
        <p>Ki • Kamehameha</p>
        <p style="font-size: 0.9rem; margin-top: 5px; color: #ff9900;">(Energy, Beam, Power)</p>
      </div>
    </div>
  </div>

  <script>
    function launchApp(url, event) {
      // Ripple Effect
      const side = event.currentTarget;
      const circle = document.createElement('div');
      const diameter = Math.max(side.clientWidth, side.clientHeight);
      const radius = diameter / 2;

      circle.style.width = circle.style.height = `${diameter}px`;
      circle.style.left = `${event.clientX - side.getBoundingClientRect().left - radius}px`;
      circle.style.top = `${event.clientY - side.getBoundingClientRect().top - radius}px`;
      circle.classList.add('ripple');

      // Remove existing ripples to keep DOM clean
      const existingRipple = side.querySelector('.ripple');
      if (existingRipple) existingRipple.remove();

      side.appendChild(circle);

      // Trigger Fade Out
      let targetColor;
      if (url === 'naruto.html') targetColor = '#ff3300';
      else if (url === 'gojo.html') targetColor = '#bb44ff';
      else if (url === 'draw.html') targetColor = '#00ff44';
      else if (url === 'dbz.html') targetColor = '#ff9900';
      
      const fadeOverlay = document.getElementById('fade-overlay');
      fadeOverlay.style.background = `radial-gradient(circle at center, ${targetColor} 0%, black 100%)`;

      setTimeout(() => {
        fadeOverlay.classList.add('active');
      }, 100);

      // Navigate after animation
      setTimeout(() => {
        window.location.href = url;
      }, 900);
    }
  </script>
</body>

</html>
