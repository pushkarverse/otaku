<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jutsu Selector</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/index.css">
</head>

<body>

  <div class="fade-overlay" id="fade-overlay"></div>

  <h1 class="title">Select Technique</h1>

  <div class="container">
    <!-- Naruto Section -->
    <div class="side" id="naruto-side" onclick="launchApp('naruto.html', event)">
      <div class="decoration"></div>
      <div class="kanji">火影</div>
      <div class="content">
        <h2>Naruto</h2>
        <p>Ninjutsu • Shadow Clone</p>
        <p style="font-size: 0.9rem; margin-top: 5px; color: #ff6600;">(Rasengan, Chidori)</p>
      </div>
    </div>

    <!-- Gojo Section -->
    <div class="side" id="gojo-side" onclick="launchApp('gojo.html', event)">
      <div class="decoration"></div>
      <div class="kanji">呪術</div>
      <div class="content">
        <h2>Gojo Sat0ru</h2>
        <p>Limitless • Infinity</p>
        <p style="font-size: 0.9rem; margin-top: 5px; color: #00eeff;">(Red, Blue, Purple, Void)</p>
      </div>
    </div>

    <!-- Draw Section -->
    <div class="side" id="draw-side" onclick="launchApp('draw.html', event)">
      <div class="decoration"></div>
      <div class="kanji">筆</div>
      <div class="content">
        <h2>Free Draw</h2>
        <p>Canvas • Colors</p>
        <p style="font-size: 0.9rem; margin-top: 5px; color: #00ff44;">(Brush, Eraser, Tools)</p>
      </div>
    </div>

    <!-- DBZ Section -->
    <div class="side" id="dbz-side" onclick="launchApp('dbz.html', event)">
      <div class="decoration"></div>
      <div class="kanji">悟</div>
      <div class="content">
        <h2>Dragon Ball Z</h2>
        <p>Ki • Kamehameha</p>
        <p style="font-size: 0.9rem; margin-top: 5px; color: #ff9900;">(Energy, Beam, Power)</p>
      </div>
    </div>
  </div>

  <script type="module" src="src/js/modules/index.js"></script>
</body>

</html>
