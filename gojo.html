<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gojo Satoru — JJK Module</title>
    
    <link rel="stylesheet" href="src/css/gojo.css">
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.173.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.173.0/examples/jsm/"
        }
    }
    </script>
    
    <!-- Dependencies that don't support ESM yet or are easier as globals -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>
    <video id="camera-video" autoplay playsinline></video>
    <div id="three-container"></div>
    <div id="dim-overlay" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;opacity:0;z-index:2;pointer-events:none;transition:opacity 0.5s;"></div>
    
    <div id="ui-overlay">
        <div id="top-bar">
            <h1>OTAKU</h1>
            <div id="technique-name">CURSED ENERGY DETECTED</div>
        </div>
    </div>

    <!-- Assets -->
    <video id="sasuke-video" src="assets/sasuke.mp4" crossorigin="anonymous" muted loop playsinline style="display:none"></video>
    <audio id="black-flash-sfx" src="assets/black_flash.mp3" preload="auto"></audio>

    <script type="module" src="src/js/modules/gojo.js"></script>
</body>
</html>
