<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naruto — Shinobi Module</title>

    <link rel="stylesheet" href="src/css/naruto.css">

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
</head>
<body>
    <video id="v_src" autoplay playsinline></video>
    <canvas id="out"></canvas>
    <div class="darkness"></div>

    <video id="n" class="fx" src="assets/naruto.mp4" crossorigin="anonymous" muted autoplay loop playsinline></video>
    <video id="s" class="fx" src="assets/sasuke.mp4" crossorigin="anonymous" muted autoplay loop playsinline></video>

    <audio id="sfx-n" src="assets/rasengan.mp3" preload="auto"></audio>
    <audio id="sfx-s" src="assets/chidori.mp3" preload="auto"></audio>
    <audio id="sfx-clone" src="assets/shadow-clone-jutsu.mp3" preload="auto"></audio>

    <div id="ui-layer">
        <div id="jutsu-left" class="jutsu-label">
            <div class="kanji" style="text-shadow: 0 0 20px rgba(0, 50, 255, 0.8);">千鳥</div>
            <div class="romaji" style="text-shadow: 0 0 15px rgba(0, 100, 255, 0.8);">CHIDORI</div>
        </div>
        <div id="jutsu-right" class="jutsu-label">
            <div class="kanji" style="text-shadow: 0 0 20px rgba(0, 150, 255, 0.8);">風遁・螺旋手裏剣</div>
            <div class="romaji" style="font-size: 1.5rem;">RASENSHURIKEN</div>
        </div>
        <div id="jutsu-center" class="jutsu-label">
            <div class="kanji">影分身の術</div>
            <div class="romaji">KAGE BUNSHIN NO JUTSU</div>
        </div>
    </div>

    <script type="module" src="src/js/modules/naruto.js"></script>
</body>
</html>
