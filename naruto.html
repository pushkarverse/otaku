<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>naruto</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+JP:wght@900&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            font-family: 'Cinzel', serif;
        }

        #v_src,
        #out {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #v_src {
            z-index: 0;
        }

        #out {
            z-index: 3;
            pointer-events: none;
        }

        .darkness {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 5, 0, 0.3);
            mix-blend-mode: multiply;
            pointer-events: none;
            z-index: 2;
        }

        .fx {
            position: absolute;
            height: auto;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
            mix-blend-mode: screen;
            z-index: 20;
        }

        #n {
            width: 1600px;
        }

        #s {
            width: 2400px;
        }

        #n,
        #s {
            position: absolute;
            opacity: 0.01;
            /* Keeps video in memory for canvas drawing without being seen */
            pointer-events: none;
            z-index: -1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Dramatic Anime Jutsu Name Overlay */
        .jutsu-label {
            position: absolute;
            opacity: 0;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: blur(10px);
            transform: translateY(20px);
            pointer-events: none;
        }

        .jutsu-label.active {
            opacity: 1;
            transform: translateY(0) !important;
            filter: blur(0px);
        }

        #jutsu-left {
            bottom: 40px;
            left: 40px;
            align-items: flex-start;
            text-align: left;
        }

        #jutsu-right {
            bottom: 40px;
            right: 40px;
            align-items: flex-end;
            text-align: right;
        }

        #jutsu-center {
            bottom: 40px;
            left: 50%;
            transform: translate(-50%, 20px);
            align-items: center;
            text-align: center;
        }

        #jutsu-center.active {
            transform: translate(-50%, 0) !important;
        }

        .kanji {
            font-family: 'Noto Serif JP', serif;
            font-size: 5rem;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 20px rgba(0, 150, 255, 0.8), 0 0 40px rgba(0, 150, 255, 0.5);
            line-height: 1;
            margin: 0;
            letter-spacing: 12px;
        }

        .romaji {
            font-size: 1.8rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 15px;
            margin-top: 10px;
            text-shadow: 0 0 15px rgba(0, 150, 255, 0.8);
            font-weight: 700;
        }

        /* Minimal hints at the top corners */
        .hints {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

    <video id="v_src" autoplay playsinline></video>
    <canvas id="out"></canvas>
    <div class="darkness"></div>

    <video id="n" class="fx" src="assets/naruto.mp4" crossorigin="anonymous" muted autoplay loop playsinline></video>
    <video id="s" class="fx" src="assets/sasuke.mp4" crossorigin="anonymous" muted autoplay loop playsinline></video>

    <audio id="sfx-n" src="assets/rasengan.mp3" preload="auto"></audio>
    <audio id="sfx-s" src="assets/chidori.mp3" preload="auto"></audio>
    <audio id="sfx-clone" src="assets/shadow-clone-jutsu.mp3" preload="auto"></audio>

    <div id="ui-layer">
        <div id="jutsu-left" class="jutsu-label">
            <div class="kanji" style="text-shadow: 0 0 20px rgba(0, 50, 255, 0.8);">千鳥</div>
            <div class="romaji" style="text-shadow: 0 0 15px rgba(0, 100, 255, 0.8);">CHIDORI</div>
        </div>
        <div id="jutsu-right" class="jutsu-label">
            <div class="kanji" style="text-shadow: 0 0 20px rgba(0, 150, 255, 0.8);">風遁・螺旋手裏剣</div>
            <div class="romaji" style="text-shadow: 0 0 15px rgba(0, 150, 255, 0.8);">RASENSHURIKEN</div>
        </div>
        <div id="jutsu-center" class="jutsu-label">
            <div class="kanji">影分身の術</div>
            <div class="romaji">KAGE BUNSHIN NO JUTSU</div>
        </div>
    </div>

    <script>
        const vElement = document.getElementById('v_src');
        const cElement = document.getElementById('out');
        const ctx = cElement.getContext('2d', { willReadFrequently: true });
        const n = document.getElementById('n');
        const s = document.getElementById('s');
        const sfxN = document.getElementById('sfx-n');
        const sfxS = document.getElementById('sfx-s');
        const sfxClone = document.getElementById('sfx-clone');
        
        const uiLeft = document.getElementById('jutsu-left');
        const uiRight = document.getElementById('jutsu-right');
        const uiCenter = document.getElementById('jutsu-center');

        // OFFSCREEN CANVAS FOR CHROMA KEYING
        const offscreenCanvas = document.createElement('canvas');
        const offCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });

        const customClones = [
            { x: -100, y: 100, scale: 0.9, delay: 2800, smokeSpawned: false },
            { x: 120, y: 100, scale: 0.85, delay: 2950, smokeSpawned: false },
            { x: -180, y: 140, scale: 0.8, delay: 3100, smokeSpawned: false },
            { x: 180, y: 160, scale: 0.7, delay: 3250, smokeSpawned: false },
            { x: -250, y: 140, scale: 0.7, delay: 3400, smokeSpawned: false },
            { x: 260, y: 160, scale: 0.65, delay: 3550, smokeSpawned: false },
        ];

        let clonesTriggered = false;
        let cloneStartTime = null;
        let mask = null;
        let pwr = [0, 0];
        let activePower = [null, null];
        let wasActive = [false, false];
        let inkPaths = [];
        let currentPath = [];

        const SMOKE_FOLDERS = ["smoke_1", "smoke_2", "smoke_3"];
        const SMOKE_FRAME_COUNT = 5;
        const SMOKE_DURATION = 600;
        const activeSmokes = [];

        function spawnSmoke(x, y, scale) {
            scale *= 1.2;
            const folder = SMOKE_FOLDERS[Math.floor(Math.random() * SMOKE_FOLDERS.length)];
            const frames = [];
            for (let i = 1; i <= SMOKE_FRAME_COUNT; i++) {
                const img = new Image();
                img.src = `assets/${folder}/${i}.png`;
                frames.push(img);
            }
            activeSmokes.push({ x, y, scale, start: performance.now(), frames });
        }

        function drawSmokes() {
            const now = performance.now();
            for (let i = activeSmokes.length - 1; i >= 0; i--) {
                const sm = activeSmokes[i];
                const elapsed = now - sm.start;
                const fIndex = Math.floor(elapsed / (SMOKE_DURATION / SMOKE_FRAME_COUNT));
                if (fIndex >= sm.frames.length) { activeSmokes.splice(i, 1); continue; }
                const img = sm.frames[fIndex];
                ctx.save();
                ctx.translate(sm.x, sm.y);
                ctx.scale(sm.scale, sm.scale);
                ctx.drawImage(img, -img.width / 2, -img.height / 2);
                ctx.restore();
            }
        }

        function grabPerson() {
            if (!mask) return null;
            const off = document.createElement("canvas");
            off.width = cElement.width; off.height = cElement.height;
            const tCtx = off.getContext("2d");
            tCtx.drawImage(mask, 0, 0, off.width, off.height);
            tCtx.globalCompositeOperation = "source-in";
            tCtx.drawImage(vElement, 0, 0, off.width, off.height);
            return off;
        }

        function drawClones(person) {
            if (!person) return;
            const now = performance.now();
            [...customClones].sort((a,b) => b.delay - a.delay).forEach(cl => {
                if (now - cloneStartTime >= cl.delay) {
                    ctx.save();
                    ctx.translate(cElement.width/2 + cl.x, cElement.height/2 + cl.y - 120);
                    ctx.scale(cl.scale, cl.scale);
                    ctx.drawImage(person, -cElement.width/2, -cElement.height/2);
                    ctx.restore();
                }
            });
            ctx.drawImage(person, 0, 0);
        }

        function processChromaKey(video, targetCtx, x, y, width, opacity) {
            if (!video || video.videoWidth === 0) return;

            const aspect = video.videoHeight / video.videoWidth;
            const height = width * aspect;

            if (offscreenCanvas.width !== video.videoWidth || offscreenCanvas.height !== video.videoHeight) {
                offscreenCanvas.width = video.videoWidth;
                offscreenCanvas.height = video.videoHeight;
            }

            offCtx.drawImage(video, 0, 0, offscreenCanvas.width, offscreenCanvas.height);
            const frame = offCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height);
            const l = frame.data.length / 4;

            for (let i = 0; i < l; i++) {
                let r = frame.data[i * 4 + 0], g = frame.data[i * 4 + 1], b = frame.data[i * 4 + 2];
                // Remove Green background
                if (g > 80 && g > r * 1.3 && g > b * 1.3) {
                    frame.data[i * 4 + 3] = 0;
                }
            }
            offCtx.putImageData(frame, 0, 0);

            targetCtx.save();
            targetCtx.globalAlpha = opacity;
            targetCtx.globalCompositeOperation = 'screen';
            targetCtx.translate(x, y);
            targetCtx.scale(-1, 1); // Un-flip the drawn video
            targetCtx.drawImage(offscreenCanvas, -width / 2, -height / 2, width, height);
            targetCtx.restore();
        }

        function checkGestures(pts) {
            if (!pts) return null;
            const wrist = pts[0];
            const tips = [4, 8, 12, 16, 20]; // Thumb, Index, Middle, Ring, Pinky
            const joints = [2, 6, 10, 14, 18]; // Reference joints (MCP for fingers, IP for thumb)
            
            const isOpen = tips.map((t, i) => {
                const tipDist = Math.hypot(pts[t].x - wrist.x, pts[t].y - wrist.y);
                const jointDist = Math.hypot(pts[joints[i]].x - wrist.x, pts[joints[i]].y - wrist.y);
                return tipDist > jointDist * 1.25; // 25% margin for "strict" extension
            });

            if (isOpen.every(v => v)) return "OPEN";
            
            // Sub-gestures (using index and middle)
            const index = isOpen[1], middle = isOpen[2], ring = isOpen[3], pinky = isOpen[4];
            
            if (index && !middle && !ring && !pinky) return "POINTING";
            if (index && middle && !ring && !pinky) return "PEACE";
            
            // Strict CLOSED check: All fingers must be folded
            if (isOpen.every(v => !v)) return "CLOSED";
            
            return null;
        }

        function drawFingerSkeleton(lm) {
            ctx.save();
            ctx.strokeStyle = "rgba(0, 255, 0, 0.8)";
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#00ff00";

            const connections = [[0,1,2,3,4], [0,5,6,7,8], [0,9,10,11,12], [0,13,14,15,16], [0,17,18,19,20]];
            connections.forEach(conn => {
                ctx.beginPath();
                conn.forEach((i, idx) => {
                    const x = lm[i].x * cElement.width, y = lm[i].y * cElement.height;
                    if (idx === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                });
                ctx.stroke();
            });

            lm.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x * cElement.width, p.y * cElement.height, 5, 0, Math.PI*2);
                ctx.fillStyle = "red";
                ctx.fill();
            });
            ctx.restore();
        }

        function triggerShadowClone() {
            if (clonesTriggered) return;
            clonesTriggered = true; cloneStartTime = performance.now();
            if (sfxClone) sfxClone.play().catch(e=>{});
            
            // UI Update
            const kanji = uiCenter.querySelector('.kanji');
            const romaji = uiCenter.querySelector('.romaji');
            kanji.innerText = '影分身の術'; romaji.innerText = 'KAGE BUNSHIN NO JUTSU';
            kanji.style.textShadow = '0 0 15px rgba(255, 150, 0, 0.8), 0 0 30px rgba(255, 100, 0, 0.5)';
            romaji.style.textShadow = '0 0 10px rgba(255, 150, 0, 0.8)';
            uiCenter.classList.add('active');

            ctx.save(); ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; ctx.fillRect(0, 0, cElement.width, cElement.height); ctx.restore();
            
            setTimeout(() => {
                clonesTriggered = false; customClones.forEach(cl => cl.smokeSpawned = false);
                uiCenter.classList.remove('active'); 
            }, 8000);
        }

        const selfie = new SelfieSegmentation({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}` });
        selfie.setOptions({ modelSelection: 1 });
        selfie.onResults(r => mask = r.segmentationMask);

        const holistic = new Holistic({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${f}` });
        holistic.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        holistic.onResults(res => {
            if (cElement.width !== vElement.videoWidth) { cElement.width = vElement.videoWidth; cElement.height = vElement.videoHeight; }
            ctx.save(); ctx.clearRect(0, 0, cElement.width, cElement.height);
            ctx.drawImage(vElement, 0, 0, cElement.width, cElement.height);
            
            const person = grabPerson();
            
            // Check Shadow Clone Trigger
            if (!clonesTriggered && res.leftHandLandmarks && res.rightHandLandmarks) {
                const gL = checkGestures(res.leftHandLandmarks), gR = checkGestures(res.rightHandLandmarks);
                if (gL === "PEACE" && gR === "PEACE") {
                    const dL = {x: res.leftHandLandmarks[8].x-res.leftHandLandmarks[5].x, y: res.leftHandLandmarks[8].y-res.leftHandLandmarks[5].y};
                    const dR = {x: res.rightHandLandmarks[8].x-res.rightHandLandmarks[5].x, y: res.rightHandLandmarks[8].y-res.rightHandLandmarks[5].y};
                    const dot = Math.abs(dL.x*dR.x + dL.y*dR.y) / (Math.hypot(dL.x,dL.y)*Math.hypot(dR.x,dR.y));
                    if (dot < 0.75) triggerShadowClone();
                }
            }

            if (clonesTriggered) {
                const now = performance.now();
                customClones.forEach(cl => {
                    if (!cl.smokeSpawned && now - cloneStartTime >= cl.delay) {
                        cl.smokeSpawned = true; spawnSmoke(cElement.width/2 + cl.x, cElement.height/2 + cl.y - 120, cl.scale);
                    }
                });
                drawClones(person); drawSmokes();
            } else if (person) { ctx.drawImage(person, 0, 0); }
            
            // Detect Combined Jutsu state before hand loop
            let isCombinedJutsu = false;
            let combinedCenter = null;
            if (res.leftHandLandmarks && res.rightHandLandmarks) {
                const gL = checkGestures(res.leftHandLandmarks), gR = checkGestures(res.rightHandLandmarks);
                // Trigger combined when hands are EXTREMELY close AND NOT in "OPEN" or "PEACE" (i.e. folded/clasped/fists)
                const dist = Math.hypot(res.leftHandLandmarks[0].x - res.rightHandLandmarks[0].x, res.leftHandLandmarks[0].y - res.rightHandLandmarks[0].y);
                // Tightened threshold from 0.3 to 0.15 for "true contact" feel
                if (dist < 0.15 && gL !== "OPEN" && gR !== "OPEN" && gL !== "PEACE" && gR !== "PEACE") {
                    isCombinedJutsu = true;
                    combinedCenter = {
                        x: (res.leftHandLandmarks[0].x + res.rightHandLandmarks[0].x) / 2 * cElement.width,
                        y: (res.leftHandLandmarks[0].y + res.rightHandLandmarks[0].y) / 2 * cElement.height - 100
                    };
                }
            }

            // Reset audio if hands are LOST
            [0, 1].forEach(idx => {
                const lm = (idx === 0) ? res.leftHandLandmarks : res.rightHandLandmarks;
                if (!lm && wasActive[idx]) {
                    const sfx = activePower[idx] === n ? sfxN : sfxS;
                    if (sfx) { sfx.pause(); sfx.currentTime = 0; }
                    wasActive[idx] = false;
                }
            });

            const hands = [];
            if (res.leftHandLandmarks) hands.push({pts: res.leftHandLandmarks, isR: false});
            if (res.rightHandLandmarks) hands.push({pts: res.rightHandLandmarks, isR: true});

            hands.forEach(h => {
                const idx = h.isR ? 1 : 0;
                drawFingerSkeleton(h.pts);

                const g = checkGestures(h.pts);
                let targetPower = null;

                if (g === "OPEN") {
                    // Reversed: Right hand (isR) -> Rasengan (n), Left hand -> Chidori (s)
                    targetPower = h.isR ? n : s;
                    activePower[idx] = targetPower;
                    pwr[idx] = Math.min(1, pwr[idx] + 0.08);
                } else if (isCombinedJutsu) {
                    // Force target power if in combined state to ensure rendering
                    if (!activePower[idx]) activePower[idx] = h.isR ? n : s;
                    targetPower = activePower[idx];
                    pwr[idx] = Math.min(1, pwr[idx] + 0.05); 
                } else if (g === "CLOSED") {
                    pwr[idx] = 0;
                    if (activePower[idx]) {
                        const sfx = activePower[idx] === n ? sfxN : sfxS;
                        if (sfx) { sfx.pause(); sfx.currentTime = 0; }
                    }
                    if (sfxClone) { sfxClone.pause(); sfxClone.currentTime = 0; }
                } else {
                    pwr[idx] = Math.max(0, pwr[idx] - 0.12);
                }

                // Sound Logic
                if (targetPower && !wasActive[idx]) {
                    targetPower.currentTime = 0; targetPower.play().catch(e=>{});
                    const sfx = targetPower === n ? sfxN : sfxS;
                    if (sfx) { sfx.currentTime = 0; sfx.play().catch(e=>{}); }
                } else if (!targetPower && wasActive[idx]) {
                     // Stop sound when gesture lost
                     const sfx = activePower[idx] === n ? sfxN : sfxS;
                     if (sfx) { sfx.pause(); sfx.currentTime = 0; }
                }
                wasActive[idx] = !!targetPower;

                if (pwr[idx] > 0.01 && activePower[idx]) {
                    if (isCombinedJutsu) {
                        // Render combined effect only once (on the second hand iteration)
                        if (idx === 1) {
                            ctx.save();
                            ctx.shadowBlur = 50;
                            ctx.shadowColor = (performance.now() % 400 < 200) ? "#00ffff" : "#0044ff";
                            const combinedPwr = Math.max(pwr[0], pwr[1]);
                            processChromaKey(n, ctx, combinedCenter.x, combinedCenter.y, 1600 * combinedPwr, 0.9);
                            processChromaKey(s, ctx, combinedCenter.x, combinedCenter.y, 2400 * combinedPwr, 0.75);
                            ctx.restore();
                        }
                    } else {
                        const x = (h.pts[0].x+h.pts[9].x)/2*cElement.width, y = ((h.pts[0].y+h.pts[9].y)/2-0.25)*cElement.height;
                        const w = (activePower[idx] === s ? 2200 : 1400) * pwr[idx];
                        processChromaKey(activePower[idx], ctx, x, y, w, pwr[idx]);
                    }
                }
            });

            // Update UI State
            if (isCombinedJutsu && pwr[0] > 0.01 && pwr[1] > 0.01) {
                const kanji = uiCenter.querySelector('.kanji');
                const romaji = uiCenter.querySelector('.romaji');
                kanji.innerText = '融合・螺旋千鳥手裏剣';
                romaji.innerText = 'RASEN CHIDORI SHURIKEN';
                kanji.style.textShadow = '0 0 25px rgba(0, 255, 255, 0.9), 0 0 50px rgba(0, 100, 255, 0.6)';
                romaji.style.textShadow = '0 0 15px rgba(0, 255, 255, 0.8)';
                uiCenter.classList.add('active');
                uiLeft.classList.remove('active');
                uiRight.classList.remove('active');
            } else {
                if (clonesTriggered) {
                    uiCenter.classList.add('active');
                } else {
                    uiCenter.classList.remove('active');
                }
                
                // Reversed UI Logic: 
                // idx 0 = Left (should be s/Chidori), idx 1 = Right (should be n/Rasengan)
                if (activePower[0] === s && pwr[0] > 0.01 && checkGestures(res.leftHandLandmarks) === "OPEN") {
                    uiLeft.classList.add('active'); // Chidori UI on Left side for Left hand
                } else {
                    uiLeft.classList.remove('active');
                }

                if (activePower[1] === n && pwr[1] > 0.01 && checkGestures(res.rightHandLandmarks) === "OPEN") {
                    uiRight.classList.add('active'); // Rasengan UI on Right side for Right hand
                } else {
                    uiRight.classList.remove('active');
                }
            }
        });

        // Clean up ink path when lifting finger
        vElement.addEventListener('play', () => {
            // Video started
        });

        const cam = new Camera(vElement, { onFrame: async () => { await selfie.send({ image: vElement }); await holistic.send({ image: vElement }); }, width: 1280, height: 720 });
        cam.start();
    </script>
</body>

</html>
